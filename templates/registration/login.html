<!-- Login template --> 
{% extends 'rodatraden/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login{% endblock %}

{% block content %}
<h2>Login</h2>
<form method="post">
  {% csrf_token %}
  {{ form|crispy }}
  {% comment %}{{ form.field|as_crispy_field }}{% endcomment %}
  <button type="submit">Login</button>
  <a class="nav-link" href="{% url 'password_reset' %}">Återställ lösenord</a>
</form>
{% endblock %}
