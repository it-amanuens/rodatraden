services:
  reverse-proxy:
    image: traefik:v3.6
    command:
      - --api.insecure=true
      - --providers.docker
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
        # forward ip address
      - --entrypoints.web.forwardedheaders.insecure=true
      - --entrypoints.websecure.forwardedheaders.insecure=true

      - --certificatesresolvers.myresolver.acme.tlschallenge=true
      - --certificatesresolvers.myresolver.acme.email=it@tekniskfysik.se
      - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
      - --log.level=DEBUG
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt
    labels:
      # HTTP to HTTPS redirection middleware
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"      
      # Catchall router for HTTP
      - "traefik.http.routers.http-catchall.rule=hostregexp(`{host:.+}`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.routers.http-catchall.service=noop@internal"
      - "traefik.http.routers.http-catchall.priority=1"
    restart: unless-stopped

  mariadb:
    image: lscr.io/linuxserver/mariadb:11.4.4
    container_name: mariadb
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - MYSQL_ROOT_PASSWORD=MLNNpxjPbpjdiFCO3K6bOkL5W
      - MYSQL_DATABASE=bookstack
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=Xav716CIwmjdsFd2wmPF8qvg3
    volumes:
      - ./bookstack_db_data:/config
    labels:
      - "traefik.enable=false"  # Don't expose MariaDB
    restart: unless-stopped

  rodatraden:
    build: /root/rodatraden
    container_name: rodatraden
    environment:
      - TZ=Europe/Stockholm
    volumes:
      - /root/rodatraden:/app
      - /root/rodatraden/static:/app/static
      - /root/rodatraden/media:/app/media
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rodatraden.rule=Host(`rt.tekniskfysik.se`)"
      - "traefik.http.routers.rodatraden.entrypoints=websecure"
      - "traefik.http.routers.rodatraden.tls=true"
      - "traefik.http.routers.rodatraden.tls.certresolver=myresolver"
      - "traefik.http.services.rodatraden.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.rodatraden-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.rodatraden.middlewares=rodatraden-headers"
    restart: unless-stopped
