<form method="post" action="">
  {% csrf_token %}

  <div class="modal-header">
    <h3 class="modal-title">Radera kurstillfälle</h3>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>

  <div class="modal-body">
    <p class="delete-text">Är du säker på att du vill radera kurstillfället 
    <strong>{{ courseoccasion.course.title }} - {{ courseoccasion.academic_year.year }}</strong>?</p>
  </div>

  <div class="modal-footer">
    <button type="submit" class="delete-btn btn btn-danger">Radera</button>
  </div>

</form>
