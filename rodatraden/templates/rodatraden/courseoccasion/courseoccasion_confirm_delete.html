{% load widget_tweaks %}

<form method="post" action="" novalidate>
  {% csrf_token %}

  <div class="modal-header">
    <h3 class="modal-title">Radera kurstillfälle</h3>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
  </div>

  <div class="modal-body">
    <p class="delete-text">Är du säker på att du vill radera kurstillfället 
    <strong>{{ courseoccasion.course.title }} - {{ courseoccasion.academic_year.year }}</strong>?</p>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Stäng</button>
    <button type="submit" class="btn btn-danger">Radera</button>
  </div>

</form>
