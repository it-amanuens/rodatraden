{% load widget_tweaks %}

<form method="post" action="" novalidate>
  {% csrf_token %}

  <div class="modal-header">
    <h3 class="modal-title">Uppdatera blockschema</h3>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
  </div>

  <div class="modal-body">

    <div class="{% if form.non_field_errors %}invalid{% endif %} mb-2">
      {% for error in form.non_field_errors %}
        {{ error }}
      {% endfor %}
    </div>

    {% for field in form %}
      <div class="form-group">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {% render_field field class+="form-control" placeholder=field.label %}
        <div class="{% if field.errors %} invalid{% endif %}">
          {% for error in field.errors %}
            <p class="alert alert-danger">{{ error }}</p>
          {% endfor %}
        </div>
      </div>
    {% endfor %}
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Stäng</button>
    <button type="submit" class="btn btn-rt">Uppdatera</button>
  </div>

</form>

<script type="text/javascript">
    // This template is intended to be loaded inside a modal on pages where
    // jQuery/select2 are already available.
    if (window.jQuery) {
      $(document).ready(function() {
        /* Disable track choice if private is selected */
        if ($('input[type="checkbox"]').prop("checked") == true) {
          $('.block-track').prop('disabled', true);
        }
        $('input[type="checkbox"]').click(function() {
          if ($(this).prop("checked") == true) {
            $('.block-track').prop('disabled', true);
          }
          else if ($(this).prop("checked") == false) {
            $('.block-track').prop('disabled', false);
          }
        });

        /* Drop-down lists for multiple choice fields. */
        if ($.fn.select2) {
          $(".select2-mult-choice").select2({ width: '100%' });
        }
      });
    }

</script>
